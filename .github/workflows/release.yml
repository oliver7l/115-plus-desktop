name: 'Release'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release type or explicit version (e.g. patch, minor, major, 1.2.3)'
        required: true
        default: 'patch'
        type: string
      release_notes:
        description: "Optional Markdown prefix for release notes; supports GFM alerts and uses \\n for line breaks"
        required: false
        default: "> [!NOTE]\\n> Add manual release notes here"
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release-it.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Configure Git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(pnpm release --changelog)

          # 如果用户提供了自定义 release notes（非默认模板），则追加到 changelog 之前
          NOTES='${{ inputs.release_notes }}'
          DEFAULT='> [!NOTE]\n> Add manual release notes here'
          if [ -n "$NOTES" ] && [ "$NOTES" != "$DEFAULT" ]; then
            NOTES=$(printf '%b' "$NOTES")
            CHANGELOG=$(printf '%s\n\n%s' "$NOTES" "$CHANGELOG")
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release-it
        id: release-it
        run: |
          pnpm release --ci ${{ inputs.version }}
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: bump
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.bump.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Install frontend dependencies
        run: pnpm install

      - name: Create .env.local file
        run: |
          if [ -f .env ]; then
            cp .env .env.local
          else
            touch .env.local
          fi
          echo "VITE_APP_ID=${{ secrets.APP_ID }}" >> .env.local
          echo "VITE_APP_KEY=${{ secrets.APP_KEY }}" >> .env.local
        shell: bash

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: '115+ v__VERSION__'
          releaseBody: ${{ needs.bump.outputs.changelog }}
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
